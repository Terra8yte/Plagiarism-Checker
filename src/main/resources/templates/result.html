<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Result</title>

    <style>

        body{
            font-family:Arial, sans-serif;
            background:#f4f6f9;
            margin:0;
            padding:0;
        }

        .container{

            width:70%;
            max-width:900px;

            margin:60px auto;

            background:white;

            padding:40px;

            border-radius:12px;

            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        h1,h2{
            color:#333;
            text-align:center;
        }

        .result{

            font-size:45px;

            color:#4CAF50;

            text-align:center;

            margin:30px 0;
        }

        .sources{

            margin-top:40px;
        }

        ul{
            list-style:none;
            padding:0;
        }

        li{
            margin:15px 0;
        }

        .source-link{

            display:block;

            background:#f1f1f1;

            padding:12px;

            border-radius:8px;

            color:#333;

            text-decoration:none;

            word-break:break-all;
        }

        .source-link:hover{
            background:#e0e0e0;
        }

        .button-container{
            text-align:center;
            margin-top:40px;
        }

        .button{

            text-decoration:none;

            background:#4CAF50;

            color:white;

            padding:14px 24px;

            border-radius:8px;

            display:inline-block;
        }

        .best-match{

            background:#e8f5e9;

            padding:20px;

            border-radius:10px;

            margin-top:30px;
        }

        .error{
            color:red;
            text-align:center;
            margin-bottom:20px;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- ERROR -->

    <div class="error">

        <p th:text="${error}"></p>

    </div>

    <!-- RESULT -->

    <h1>Plagiarism Result</h1>

    <div class="result">

        <span th:text="${similarity}"></span> %

    </div>

    <!-- BEST MATCH -->

    <div class="best-match"
         th:if="${bestSource != null}">

        <h2>Best Match Source</h2>

        <a class="source-link"
           th:href="${bestSource}"
           th:text="${bestSource}"
           target="_blank">
        </a>

    </div>

    <!-- SOURCES -->

    <div class="sources"
         th:if="${sources != null}">

        <h2>Matched Sources</h2>

        <ul>

            <li th:each="source : ${sources}">

                <a class="source-link"
                   th:href="${source}"
                   th:text="${source}"
                   target="_blank">
                </a>

            </li>

        </ul>

    </div>

    <!-- BUTTON -->

    <div class="button-container">

        <a class="button" href="/">
            Check Again
        </a>

    </div>

</div>

</body>
</html>
